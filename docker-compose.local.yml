services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: change_me
      POSTGRES_DB: license_base
    volumes:
      - license_base_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d license_base"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  license_base_db_data:
